<!DOCTYPE html>

<style>
:root{
  --bg:#faf8f3; --card:#ffffff; --ink:#2c2c2a; --sub:#5f5e5a; --line:#e4e0d6;

}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
  line-height:1.7;font-size:16px}
header{padding:16px 16px 8px;text-align:center;border-bottom:1px solid var(--line)}
header h1{margin:0;font-size:20px;font-weight:700}
header p{margin:4px 0 0;color:var(--sub);font-size:13px}
.subjbar{display:flex;gap:8px;align-items:center;justify-content:center;padding:10px 8px 0}
.tabs{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;padding:10px 8px;
  position:sticky;top:0;background:var(--bg);z-index:5;border-bottom:1px solid var(--line)}
.tab{padding:8px 14px;border:1px solid var(--line);background:var(--card);border-radius:999px;
  cursor:pointer;font-size:14px;color:var(--sub)}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
main{max-width:760px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin:0 0 12px}
.term-h{display:flex;align-items:baseline;gap:8px;cursor:pointer}
.term-h b{font-size:17px}
.term-h .yomi{color:var(--sub);font-size:12px}
.term-h .chev{margin-left:auto;color:var(--sub);font-size:13px}
.term-body{display:none;margin-top:10px}
.term-body.open{display:block}
.kv{display:grid;grid-template-columns:78px 1fr;gap:6px 10px;margin-top:6px;font-size:14.5px}
.kv .k{color:var(--sub);font-size:13px}
.pill{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;margin:2px 4px 2px 0}
.pill.t{background:var(--teal-bg);color:var(--teal)} .pill.c{background:var(--coral-bg);color:var(--coral)}
.pill.a{background:var(--amber-bg);color:var(--amber)} .pill.b{background:var(--blue-bg);color:var(--blue)}

.tech .lbl{color:var(--sub);font-size:12.5px;margin-top:8px}
.tech .ex{background:var(--bg);border-radius:8px;padding:8px 10px;margin-top:4px;font-size:14px}
.bar{height:8px;background:var(--line);border-radius:9px;overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:var(--teal)}
.q-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.q-stem{font-size:16.5px;font-weight:600;margin:6px 0 14px}

.opt.sel{border-color:var(--blue);background:var(--blue-bg)}
.opt.ok{border-color:var(--green);background:var(--green-bg)}
.opt.ng{border-color:var(--red);background:var(--red-bg)}
.opt .mk{font-weight:700;margin-right:8px}

.fb .verdict{font-weight:700;font-size:16px;margin-bottom:8px}

.fb .note{background:var(--teal-bg);color:#085041;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:14px}
select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:var(--card)}
.muted{color:var(--sub);font-size:13px}
.stat-row{display:flex;align-items:center;gap:10px;margin:10px 0}
.stat-row .nm{flex:0 0 46%;font-size:14px}
.stat-row .pct{flex:0 0 52px;text-align:right;font-size:13px;color:var(--sub)}
.stat-row .b2{flex:1}
.big{font-size:28px;font-weight:700}
hr.soft{border:none;border-top:1px solid var(--line);margin:14px 0}
.ctbl{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:8px}
.ctbl th,.ctbl td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top}

.ctbl .hl{color:var(--coral);font-weight:600}

/* ============================================================
   キャッシュ対策（GitHub Pages 用）／自動更新・版数表示
   ・ページを開くたびに最新版を確認し、古ければ別URLへ遷移して更新
   ・右下に現在の版数を表示
   ・内容を更新したら必ず下の APP_VERSION の値を上げること
   ============================================================ */
const APP_VERSION = '2026-06-24-05';
(function showVersionBadge(){
  try{
    function add(){
      var b=document.createElement('div');
      b.textContent='v'+APP_VERSION;
      b.style.cssText='position:fixed;right:6px;bottom:6px;z-index:9999;'
        +'font-size:11px;color:#8a877f;background:rgba(255,255,255,.85);'
        +'padding:2px 6px;border:1px solid #e4e0d6;border-radius:6px;'
        +'font-family:system-ui,sans-serif;pointer-events:none;';
      document.body.appendChild(b);
    }
    if(document.body) add(); else document.addEventListener('DOMContentLoaded', add);
  }catch(e){}
})();
(function checkForUpdate(){
  try{
    fetch(location.pathname + '?_=' + Date.now(), { cache:'no-store' })
      .then(function(r){ return r.ok ? r.text() : Promise.reject(); })
      .then(function(text){
        var m = text.match(/APP_VERSION\s*=\s*['"]([^'"]+)['"]/);
        if(!m) return;
        var latest = m[1];
        if(latest === APP_VERSION) return;
        if(location.search.indexOf('v=' + latest) !== -1) return;
        location.replace(location.pathname + '?v=' + encodeURIComponent(latest));
      })
      .catch(function(){});
  }catch(e){}
})();

 core:`
  <div class="card muted">行審法の混同を断つ暗記コア。主体・期間・3類型・教示を並べて覚える。</div>
  <div class="card"><b>① 登場人物・役割</b>
   <table class="ctbl">
   <tr><th>登場人物</th><th>役割</th></tr>
   <tr><td>審査請求人</td><td>処分・不作為に不服があり審査請求をする者</td></tr>
   <tr><td>処分庁</td><td>処分をした行政庁。<span class="hl">弁明書</span>を出す</td></tr>
   <tr><td>審査庁</td><td>審査請求を受け<span class="hl">裁決</span>する（原則＝最上級行政庁）</td></tr>
   <tr><td>審理員</td><td>審査庁が<span class="hl">指名</span>。審理を主宰し審理員意見書を作成</td></tr>
   <tr><td>行政不服審査会</td><td>審査庁が<span class="hl">諮問</span>する第三者機関。答申で客観性を担保</td></tr>
   <tr><td>参加人</td><td>審理に参加する利害関係人</td></tr>
   </table>
   <div class="muted" style="margin-top:6px">流れ：審査請求 →〔審理員〕審理 → 意見書 →〔審査庁〕諮問 → 答申 →〔審査庁〕裁決</div>
  </div>
  <div class="card"><b>② 期間（不服申立て・訴訟）</b>
   <table class="ctbl">
   <tr><th>手続</th><th>知った日の翌日から</th><th>処分等の日の翌日から</th></tr>
   <tr><td>審査請求</td><td>3か月</td><td>1年</td></tr>
   <tr><td>再調査の請求</td><td>3か月</td><td>1年</td></tr>
   <tr><td>再審査請求</td><td><span class="hl">1か月</span>（罠）</td><td>1年</td></tr>
   <tr><td>取消訴訟（出訴期間）</td><td><span class="hl">6か月</span></td><td>1年</td></tr>
   </table>
   <div class="muted" style="margin-top:6px">再審査だけ1か月・起点は原裁決。客観的期間は原則1年。正当な理由があれば例外。</div>
  </div>
  <div class="card"><b>③ 義務レベル（行審法の主な規定）</b>
   <table class="ctbl">
   <tr><th>規定</th><th>レベル</th></tr>
   <tr><td>標準審理期間を定める（16条）</td><td><span class="hl">努力義務</span>（定めたら公にする＝義務）</td></tr>
   <tr><td>審理員名簿の作成（17条）</td><td><span class="hl">努力義務</span></td></tr>
   <tr><td>審理員の指名（9条）</td><td>義務（原則）</td></tr>
   <tr><td>行審会への諮問（43条）</td><td>義務（原則＝必要的・例外あり）</td></tr>
   </table>
   <div class="muted" style="margin-top:6px">「定める系＝努力義務／動かす系＝義務」でざっくり対比。</div>
  </div>
  <div class="card"><b>④ 3類型の区別</b>
   <table class="ctbl">
   <tr><th></th><th>審査請求</th><th>再調査の請求</th><th>再審査請求</th></tr>
   <tr><td>位置づけ</td><td>原則・基本</td><td>法定時のみ</td><td>法定時のみ</td></tr>
   <tr><td>誰に</td><td>審査庁</td><td>処分庁</td><td>法律が定める庁</td></tr>
   <tr><td>対象</td><td>処分・不作為</td><td>処分</td><td>審査請求の裁決</td></tr>
   <tr><td>期間</td><td>3か月</td><td>3か月</td><td><span class="hl">1か月</span></td></tr>
   </table>
   <div class="muted" style="margin-top:6px">再調査＝前さばき（任意）／審査請求＝本筋／再審査＝裁決の後。前後の2つは法定時のみ。</div>
  </div>
  <div class="card"><b>⑤ 教示：行審法 vs 行訴法</b>
   <table class="ctbl">
   <tr><th></th><th>行審法（82・83条）</th><th>行訴法（46条）</th></tr>
   <tr><td>案内対象</td><td>不服申立て</td><td>取消訴訟</td></tr>
   <tr><td>教示事項</td><td>①できる旨 ②<span class="hl">行政庁</span> ③<span class="hl">期間</span></td><td>①<span class="hl">被告</span> ②<span class="hl">出訴期間</span> ③前置の有無</td></tr>
   <tr><td>誤教示・不教示の救済</td><td><span class="hl">あり</span></td><td>なし</td></tr>
   </table>
   <div class="muted" style="margin-top:6px">急所：行審法＝行政庁・期間／行訴法＝被告・出訴期間。救済規定は行審法だけ。</div>
  </div>
  <div class="card"><b>⑥ 執行停止：行審法 vs 行訴法</b>
   <table class="ctbl">
   <tr><th></th><th>行審法（25・27条）</th><th>行訴法（25・27条）</th></tr>
   <tr><td>止めるのは</td><td>審査庁</td><td><span class="hl">裁判所</span></td></tr>
   <tr><td>職権でできるか</td><td>ティア①(上級庁・処分庁である審査庁)＝<span class="hl">職権でも可</span>／ティア②＝申立てのみ＋処分庁の意見聴取</td><td><span class="hl">常に申立てのみ</span>（職権は一切不可）</td></tr>
   <tr><td>その他の措置</td><td>ティア①のみ<span class="hl">可</span></td><td>なし</td></tr>
   <tr><td>効力停止の補充性</td><td>規定なし</td><td><span class="hl">あり</span>（他の措置で足りるなら効力停止不可）</td></tr>
   <tr><td>内閣総理大臣の異議</td><td>なし</td><td><span class="hl">あり（27条）</span></td></tr>
   <tr><td>損害要件</td><td>重大な損害＋緊急の必要</td><td>重大な損害＋緊急の必要（旧『回復困難』）</td></tr>
   </table>
   <div class="muted" style="margin-top:6px">識別子3点：<b>その他の措置</b>＝行審ティア①／<b>効力停止の補充性</b>＝行訴／<b>内閣総理大臣の異議</b>＝行訴。職権で止められるのは行審の身内だけ。</div>
  </div>
  <div class="card"><b>⑦ 審査請求の対象（＝処分性）と審理員を置かない例外</b>
   <table class="ctbl">
   <tr><th>審査請求の対象か？</th><th>結論</th></tr>
   <tr><td>継続的性質を有する権力的事実行為（収容・留置）</td><td><span class="hl">対象○</span></td></tr>
   <tr><td>指定確認検査機関の建築確認（私人の"みなし処分"）</td><td><span class="hl">対象○</span></td></tr>
   <tr><td>条例に基づく地方公共団体の処分</td><td>対象○</td></tr>
   <tr><td>処分に当たらない行政指導</td><td><span class="hl">原則対象外</span>（不服は行手法36条の2の中止等の求め＝別制度）</td></tr>
   </table>
   <div class="muted" style="margin-top:6px">審理員を置かない例外＝<b>却・条・合</b>：却（補正不可の不適法却下）／条（<span class="hl">条例に基づく処分</span>で条例に定め）／合（合議制の審査庁）。<b>法律に基づく処分は外せない</b>（内規でも不可）。</div>
  </div>`
},

gyoso: {
 label:"行政事件訴訟法",
 LS:"gyoso_tokkun_v1",
 TECH:{
  H1:{n:"義務付け 申請型↔非申請型の混同罠", how:"併合が必要なのは『申請型』だけ（拒否処分取消訴訟or不作為違法確認と併合）。非申請型は単独。『申請型/非申請型』のラベルと中身（併合の要否）を入れ替えてくる。",
      ex:"『非申請型は取消訴訟と併合必須』は誤り＝非申請型は単独。併合必須は申請型。"},
  H2:{n:"差止めに申請の区別を持ち込む罠", how:"『申請型/非申請型』は義務付け専用の分類。差止めにこの区別はない。差止めは名宛人本人でも第三者でも、重大な損害＋補充性＋法律上の利益があれば提起できる。",
      ex:"『差止訴訟は処分の名宛人のみが提起でき第三者はできない』は誤り。第三者も可。"},
  H3:{n:"損害要件の3段階すり替え罠", how:"①執行停止＝重大な損害を避けるため緊急の必要／②差止・非申請型義務付け＝重大な損害を生ずるおそれ／③仮の救済（仮の義務付け・仮の差止）＝償うことのできない損害＋緊急の必要。文言を入れ替える。",
      ex:"『差止訴訟の要件は償うことのできない損害』は誤り＝それは仮の救済。差止は重大な損害を生ずるおそれ。"},
  H4:{n:"仮の救済↔本案のペアすり替え罠", how:"仮の救済は本案と同種でペア。仮の義務付け⇔義務付け訴訟／仮の差止め⇔差止訴訟／執行停止⇔取消訴訟。本案を取消訴訟にすり替えてくる。",
      ex:"『仮の義務付けの本案は取消訴訟』は誤り＝本案は義務付け訴訟。"},
  H5:{n:"内閣総理大臣の異議の準用罠", how:"内閣総理大臣の異議（27条）は執行停止だけでなく、仮の義務付け・仮の差止めにも準用される（37条の5第4項）。『準用されない』は誤り。",
      ex:"『仮の救済には内閣総理大臣の異議は準用されない』は誤り＝準用される。"},
  H6:{n:"原告適格の罠", how:"①名宛人(直接の相手方)は当然に原告適格あり＝9条2項は不要。9条2項は『第三者』の判断道具。②法律上保護された利益(個別的利益)＝あり／反射的利益(一般公益のおこぼれ・一般消費者・競業の経済的不利益)＝なし。③9条2項は原告適格を広げる方向(文言のみによらず趣旨目的・関係法令・害され方を考慮)。差止・非申請型義務付けに準用。",
      ex:"『一般消費者の利益は法律上保護された利益』は誤り＝反射的利益。『9条2項は名宛人の原告適格を判断する規定』は誤り＝第三者用。"},
  H7:{n:"訴訟類型の振り分け＆無名抗告訴訟の罠", how:"3つの箱に分ける。①抗告訴訟＝処分(公権力)に不服＝取消(処分/裁決)・無効等確認・不作為違法確認・義務付け・差止めの6類型／②当事者訴訟＝対等な法律関係(形式的=処分裁決に関し法令で一方を被告／実質的=公法上の法律関係の確認等)／③客観訴訟＝民衆訴訟・機関訴訟(自己の利益と無関係・法律が定める場合に法律が定める者に限り提起)。境界の外は『民衆・機関・当事者』の3つだけ＝それ以外は抗告訴訟。無名抗告訴訟(法定外)は3条1項の包括定義ゆえ解釈上認められる余地あり。被告は行政庁でなく国・公共団体(2004改正・行政主体主義)。",
      ex:"『差止め・無効等確認・義務付けは抗告訴訟でない』は誤り＝抗告訴訟。『当事者訴訟は抗告訴訟』は誤り。『民衆訴訟は何人も提起できる』は誤り＝法律が定める者に限る。『無名抗告訴訟は一切認められない』は誤り。『取消訴訟の被告は処分庁』は誤り＝国・公共団体。"}

 TERMS:[

 core:`
  <div class="card muted">義務付け・差止・仮の救済の暗記コア。「時間軸×何を求めるか」で地図化し、識別子で振り分ける。</div>
  <div class="card"><b>① 抗告訴訟の地図（時間軸）</b>
   <table class="ctbl">
   <tr><th>処分のタイミング</th><th>求めること</th><th>訴訟</th></tr>
   <tr><td>過去（もう出た）</td><td>消したい</td><td>取消訴訟／無効等確認</td></tr>
   <tr><td>現在（申請に応答なし）</td><td>応答させたい</td><td>不作為の違法確認</td></tr>
   <tr><td>現在（申請が拒否/放置）</td><td><span class="hl">処分をさせたい（本人）</span></td><td>申請型 義務付け</td></tr>
   <tr><td>—（第三者）</td><td><span class="hl">処分をさせたい（他人へ）</span></td><td>非申請型 義務付け</td></tr>
   <tr><td>未来（出そう）</td><td><span class="hl">させたくない</span></td><td>差止め</td></tr>
   </table>
   <div class="muted" style="margin-top:6px">2軸：やらせる＝義務付け／やめさせる＝差止め。取消し＝事後／差止め＝事前。</div>
  </div>
  <div class="card"><b>② 義務付けは2種類（この分類は義務付け専用）</b>
   <table class="ctbl">
   <tr><th></th><th>申請型（37条の3）</th><th>非申請型＝直接型（37条の2）</th></tr>
   <tr><td>誰が</td><td>申請した本人</td><td>申請権なき第三者</td></tr>
   <tr><td>具体例</td><td>営業許可を申請→拒否/放置→「許可を出せ」</td><td>近隣住民が「違法工場に改善命令を出せ」</td></tr>
   <tr><td>併合</td><td><span class="hl">必須</span>（拒否型→取消訴訟／不作為型→不作為違法確認）</td><td><span class="hl">単独</span></td></tr>
   <tr><td>特有要件</td><td>併合した訴えに理由＋処分すべきことが明らか等</td><td><span class="hl">重大な損害＋補充性</span></td></tr>
   </table>
   <div class="muted" style="margin-top:6px">識別子：『併合』が出たら申請型／『重大な損害＋補充性』が出たら非申請型。入口(申請)があるかで分かれる。</div>
  </div>
  <div class="card"><b>③ 差止め（37条の4）— 申請者/非申請者の区別なし</b>
   <table class="ctbl">
   <tr><th>項目</th><th>内容</th></tr>
   <tr><td>何を</td><td>これからされる処分を事前に止める</td></tr>
   <tr><td>併合</td><td><span class="hl">単独</span>（消すべき既存処分がない）</td></tr>
   <tr><td>要件</td><td><span class="hl">重大な損害を生ずるおそれ＋補充性</span>（＝非申請型義務付けと同じ）</td></tr>
   <tr><td>原告</td><td>名宛人本人でも<span class="hl">第三者でも可</span>（法律上の利益）</td></tr>
   </table>
   <div class="muted" style="margin-top:6px">差止めは非申請型義務付けの鏡像（させる⇔させない／要件は同じ）。</div>
  </div>
  <div class="card"><b>④ 損害要件の3段階</b>
   <table class="ctbl">
   <tr><th>場面</th><th>損害の文言</th><th>条文</th></tr>
   <tr><td>執行停止（事後の応急）</td><td>重大な損害を<span class="hl">避けるため緊急の必要</span></td><td>行訴25条</td></tr>
   <tr><td>差止・非申請型義務付け（事前・本案）</td><td>重大な損害を<span class="hl">生ずるおそれ</span></td><td>37条の2／37条の4</td></tr>
   <tr><td>仮の救済（最強の暫定）</td><td><span class="hl">償うことのできない損害</span>＋緊急の必要</td><td>37条の5</td></tr>
   </table>
   <div class="muted" style="margin-top:6px">『重大な損害』が標準ライン。『償うことのできない損害』が出たら仮の救済。</div>
  </div>
  <div class="card"><b>⑤ 仮の救済（37条の5）＝本案とペア</b>
   <table class="ctbl">
   <tr><th>暫定措置</th><th>前提とする本案</th></tr>
   <tr><td>執行停止</td><td>取消訴訟・無効確認</td></tr>
   <tr><td><span class="hl">仮の義務付け</span></td><td><span class="hl">義務付け訴訟</span></td></tr>
   <tr><td><span class="hl">仮の差止め</span></td><td><span class="hl">差止訴訟</span></td></tr>
   </table>
   <div class="muted" style="margin-top:6px">要件＝償うことのできない損害＋緊急の必要＋本案に理由があるとみえる。公共の福祉に重大な影響→不可。<b>内閣総理大臣の異議（27条）が準用</b>（37条の5第4項）＝執行停止とつながる。</div>
  </div>
  <div class="card"><b>⑥ 原告適格（9条）</b>
   <table class="ctbl">
   <tr><th>立場</th><th>原告適格</th><th>判断方法</th></tr>
   <tr><td>名宛人（直接の相手方）</td><td><span class="hl">当然にあり</span></td><td>9条2項は不要</td></tr>
   <tr><td>第三者</td><td>利益の性質による</td><td><span class="hl">9条2項</span>で判断</td></tr>
   </table>
   <table class="ctbl" style="margin-top:8px">
   <tr><th></th><th>法律上保護された利益</th><th>反射的利益</th></tr>
   <tr><td>中身</td><td>根拠法令が<span class="hl">個別的利益</span>として保護</td><td>一般公益のおこぼれ（事実上の利益）</td></tr>
   <tr><td>原告適格</td><td><span class="hl">あり</span></td><td>なし</td></tr>
   <tr><td>例</td><td>周辺住民の生命・身体（もんじゅ・小田急）</td><td>一般消費者（主婦連）／競業の経済的不利益</td></tr>
   </table>
   <div class="muted" style="margin-top:6px"><b>9条2項の考慮事項</b>：文言のみによらず①根拠法令の趣旨・目的 ②利益の内容・性質＋③関係法令の趣旨目的を参酌 ④害される利益の内容性質・害され方を勘案＝<b>原告適格を広げる方向</b>。差止・非申請型義務付けに<b>準用</b>。</div>
  </div>
  <div class="card"><b>⑦ 訴訟類型の全体地図（3つの箱に振り分ける）</b>
   <table class="ctbl">
   <tr><th>箱</th><th>中身</th><th>キモ</th></tr>
   <tr><td><span class="hl">抗告訴訟</span>（処分に文句）</td><td>①処分取消 ②裁決取消 ③無効等確認 ④不作為違法確認 ⑤義務付け ⑥差止め</td><td>公権力の行使に対する不服。法定外の<span class="hl">無名抗告訴訟</span>の余地もあり（「一切認められない」は誤り）</td></tr>
   <tr><td>当事者訴訟（対等な関係）</td><td>形式的（処分裁決に関し法令で一方を被告）／実質的（公法上の法律関係の確認等）</td><td>処分を争うのではない＝抗告訴訟ではない</td></tr>
   <tr><td>客観訴訟（自己の利益と無関係）</td><td>民衆訴訟・機関訴訟</td><td><span class="hl">法律が定める場合に、法律が定める者に限り</span>提起（「何人も」は誤り）</td></tr>
   </table>
   <div class="muted" style="margin-top:6px">迷ったら：<b>抗告訴訟の外は「民衆・機関・当事者」の3つだけ。それ以外（差止め・無効等確認・義務付けを含む）は全部抗告訴訟。</b> 被告は行政庁でなく<b>国・公共団体（2004改正・行政主体主義）</b>。</div>
  </div>`

      ex:"営業許可の取消し→聴聞／30日の営業停止→弁明の機会。聴聞は口頭・対審的、弁明は原則書面。"},
  G2:{n:"審査基準は義務・処分基準は努力義務の罠", how:"申請に対する審査基準（5条）は『定める』も『公にする』も義務。不利益処分の処分基準（12条）はどちらも努力義務。義務／努力義務をひっくり返してくる。",
      ex:"審査基準＝設定義務＋公表義務。処分基準＝設定努力＋公表努力。"},
  G3:{n:"標準処理期間の片務の罠", how:"標準処理期間（6条）は『定める』のは努力義務、しかし『定めたら公にする』のは義務。設定は任意でも公表は必須、という片務構造。",
      ex:"審査基準は公表まで義務、標準処理期間は設定だけ努力義務で公表は義務。標準審理期間（行審）と混同しない。"},
  G4:{n:"理由提示の程度の罠", how:"申請拒否（8条）・不利益処分（14条）には理由を示す。原則は処分と同時、書面でする処分なら理由も書面。処分基準があるときは、どの基準にどう当てはめたかが分かる程度に示す（一級建築士免許取消事件）。",
      ex:"『公益上の必要により』だけでは不足。適用法条＋具体的事実＋基準の適用過程まで。"},
  G5:{n:"受理概念の否定の罠", how:"申請が事務所に到達したら、行政庁は遅滞なく審査を開始する義務（7条）。『受理しない』『受付で返す』はできない。形式不備は補正を求めるか、拒否処分をする。",
      ex:"窓口での事実上の返戻（受理拒否）は違法。形式不備でも一旦到達＝審査義務が発生。"},
  G6:{n:"行政指導は任意の罠", how:"行政指導はあくまで相手方の任意の協力によってのみ実現する（32条2項）。従わないことを理由に不利益な取扱いをしてはならない。相手に従う法的義務はない。",
      ex:"指導に従わないからと許可を遅らせる・不許可にするのは違法。真摯に拒否されたのに続ける申請関連指導も違法（33条）。"},
  G7:{n:"行政指導の方式の罠", how:"行政指導に携わる者は、相手方に趣旨・内容・責任者を明確に示さなければならない（35条1項）。相手が書面交付を求めたら原則交付（35条3項）。許認可権限を背景にするなら根拠条項等も示す（35条2項）。",
      ex:"口頭の指導でも、求められれば原則として趣旨・内容・責任者を記した書面を交付。"},
  G8:{n:"申出制度（中止/処分の求め）の罠", how:"中止等の求め（36条の2）＝法律に根拠ある行政指導が要件不適合と思う『相手方』が求める。処分等の求め（36条の3）＝『何人も』法令違反是正の処分・行政指導を求める。いずれも行政は必要な調査・措置にとどまり、申出どおりの処分に拘束されない。平成26年改正で新設。",
      ex:"中止の求めは相手方限定、処分の求めは何人も。求めても行政は調べる義務までで結論は拘束されない。"},
  G9:{n:"届出の到達主義の罠", how:"届出は、形式上の要件に適合していれば、提出先の事務所に到達した時点で手続上の義務が履行されたものとなる（37条）。行政の受理・承認・受付印は不要。",
      ex:"形式が整った届出が到達＝それで完了。行政が受け取らない・承認しないは関係ない。"},
  G10:{n:"適用除外（地方公共団体）の罠", how:"地方公共団体の機関がする処分は、根拠が条例・規則なら適用除外（法律なら適用）。行政指導・届出・命令等制定は根拠を問わず一律適用除外（3条3項）。処分だけ根拠で分かれる点が罠。",
      ex:"市の条例に基づく処分＝適用除外。市が法律に基づいてする処分＝適用あり。市の行政指導＝根拠問わず適用除外。"},
  G11:{n:"意見公募手続（パブコメ）の罠", how:"命令等（政省令・審査基準・処分基準・行政指導指針）を定めるには意見公募手続。意見提出期間は原則30日以上、定めたら結果を公示（39・43条）。平成17年改正で新設＝平成26年改正ではない。",
      ex:"30日以上の期間を設け広く意見を募り、考慮した結果と理由を公示。個別の処分そのものはパブコメ不要。"},
  G12:{n:"聴聞手続の権利の罠", how:"主宰者は行政庁が指名（19条）。当事者・参加人は審理の進行で文書等の閲覧を請求でき（18条）、代理人を選任でき（16条）、口頭で意見を述べ証拠を提出できる。行政庁は聴聞調書・報告書をしんしゃくして処分を決める（26条）。",
      ex:"当事者は聴聞の通知後から文書閲覧を請求できる。主宰者は処分そのものを決める権限はない（決めるのは行政庁）。"},
  G13:{n:"文書等閲覧の『誰・いつ・何を』の罠", how:"聴聞の文書等閲覧（18条）は、当事者＋自己の利益を害される参加人（＝当事者等）が、聴聞の通知があった時から終結する時までの間、原因事実を証する資料を閲覧できる。行政庁は第三者の利益等の正当な理由がなければ拒めない。『閲覧』であって写しの交付（謄写）の規定はない。",
      ex:"通知時から請求可（期日開始を待たない）。終結後は不可。参加人も自己の利益を害される者なら可。"},
  G14:{n:"弁明には閲覧・参加人・質問権がない罠", how:"弁明の機会の付与に準用されるのは代理人（16条）等のみで、文書等閲覧（18条）・参加人（17条）・質問権（20条）は準用されない。これらは聴聞固有の手厚い権利。弁明＝原則書面＋代理人は可、まで。",
      ex:"弁明で当事者が『資料を閲覧したい』『参加人を入れたい』『職員に質問したい』は不可。聴聞だけ。"},
  G15:{n:"報告書の『参酌』は拘束ではない罠", how:"行政庁は不利益処分の決定時、聴聞調書の内容と報告書の主宰者の意見を『十分に参酌』する（26条）。だが参酌であって拘束ではない。主宰者が『主張に理由あり』としても、行政庁が異なる処分をすることは可能。逆に調書・報告書を全く参酌せずに処分すれば違法。",
      ex:"主宰者の意見＝結論を縛らない（決めるのは行政庁）。報告書を作るのは主宰者、処分を決めるのは行政庁、と役割が分かれる。"},
  G16:{n:"役員解任の特例＝名あて人と被解任者の分離（28条）", how:"法人の役員の解任・業務従事者の解任・会員の除名を命ずる処分（13条1項1号ハ）は聴聞対象。処分の名あて人は法人等だが、実際に解任・解雇・除名される個人は28条の特例で当事者として扱われ、通知・閲覧・意見陳述等の当事者の権利を持つ。主宰者の許可が要る参加人（17条）より手厚い。",
      ex:"会社への役員解任命令＝名あて人は会社。だが解任される役員本人も当事者として聴聞に関与できる。行政書士試験では手薄、特定考査の狙い目。"}
 },

/* ============ 現在の科目・進捗 ============ */
let cur = localStorage.getItem("tokkun_cur") || "youken";
if(!SUBJECTS[cur]) cur = "youken";
function S(){ return SUBJECTS[cur]; }
function tkeys(){ return Object.keys(S().TECH); }

let store = {};
function loadStore(){ store = JSON.parse(localStorage.getItem(S().LS)||"{}"); }
function save(){ localStorage.setItem(S().LS, JSON.stringify(store)); }
function record(q,correct){
  const k=String(q.id); store[k]=store[k]||{seen:0,correct:0};
  store[k].seen++; if(correct)store[k].correct++; save();
}
function techStats(){
  const m={}; tkeys().forEach(k=>m[k]={seen:0,correct:0});
  S().QS.forEach(q=>{const s=store[String(q.id)]; if(!s)return;
    q.tech.forEach(tk=>{if(m[tk]){m[tk].seen+=s.seen;m[tk].correct+=s.correct;}});});
  return m;
}

/* ============ 画面 ============ */
const main=document.getElementById("main");
let view="drill";

const subj=document.getElementById("subj");
subj.innerHTML=Object.keys(SUBJECTS).map(k=>`<option value="${k}" ${k===cur?"selected":""}>${SUBJECTS[k].label}</option>`).join("");
subj.onchange=()=>{
  cur=subj.value; localStorage.setItem("tokkun_cur",cur);
  loadStore(); curFilter="all"; onlyWrong=false; pool=[]; view="drill"; setTab("drill"); render();
};
function setTab(v){[...document.querySelectorAll(".tab")].forEach(x=>x.classList.toggle("on",x.dataset.v===v));}
document.getElementById("tabs").addEventListener("click",e=>{
  const t=e.target.closest(".tab"); if(!t)return;
  setTab(t.dataset.v); view=t.dataset.v; render();
});

/* --- 演習 state --- */
let pool=[], pi=0, answered=false, onlyWrong=false, curFilter="all";
function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildPool(filterTech){
  let arr=S().QS.slice();
  if(filterTech&&filterTech!=="all") arr=arr.filter(q=>q.tech.includes(filterTech));
  if(onlyWrong) arr=arr.filter(q=>{const s=store[String(q.id)];return s&&s.correct<s.seen;});
  // 問題順をシャッフルし、さらに各問の選択肢(choices)・記述(stmts)の並びもシャッフル
  // （正解肢が常に先頭＝①になる偏りを解消。元データは破壊せずコピーを並べ替える）
  arr=shuf(arr).map(q=>{
    const c={...q};
    if(q.choices) c.choices=shuf(q.choices);
    if(q.stmts) c.stmts=shuf(q.stmts);
    return c;
  });
  pool=arr; pi=0; answered=false;
}

function render(){
  if(view==="drill")return renderDrill();
  if(view==="core")return renderCore();
  if(view==="terms")return renderTerms();
  if(view==="tech")return renderTech();
  if(view==="weak")return renderWeak();
}

function renderDrill(){
  if(!pool.length) buildPool(curFilter);
  let opts=`<option value="all">すべての罠</option>`+tkeys().map(k=>`<option value="${k}" ${k===curFilter?"selected":""}>${k}：${S().TECH[k].n}</option>`).join("");
  let head=`<div class="card"><div class="row">
    <span class="muted">出題範囲</span>
    <select id="filt">${opts}</select>
    <label class="muted"><input type="checkbox" id="ow" ${onlyWrong?"checked":""}> 間違えた問題だけ</label>
    <button class="btn ghost" id="reshuffle">引き直す</button>
  </div></div>`;
  if(!pool.length){main.innerHTML=head+`<div class="card">該当する問題がありません。条件を変えてください。</div>`;wireDrillHead();return;}
  const q=pool[pi];
  let body;
  if(q.type==="select"){
    body=q.choices.map((c,i)=>`<button class="opt" data-i="${i}"><span class="mk">${"１２３４"[i]}</span>${c.t}</button>`).join("");
  }else{
    const lt="アイウエ";
    body=q.stmts.map((s,i)=>`<div class="opt" style="cursor:default"><span class="mk">${lt[i]}</span>${s.t}</div>`).join("")
      +`<div style="margin-top:6px" class="muted">↓ 正しいものの個数を選ぶ</div>`
      +[1,2,3,4].map(n=>`<button class="opt cnt" data-n="${n}"><span class="mk">${"１２３４"[n-1]}</span>${"一二三四"[n-1]}つ</button>`).join("");
  }
  main.innerHTML=head+`<div class="card">
    <div class="q-meta muted">問 ${pi+1} / ${pool.length}</div>
    <div class="q-stem">${q.stem}</div>
    <div id="opts">${body}</div>
    <div class="fb" id="fb"></div>
    <div class="row" id="nav" style="display:none">
      <button class="btn" id="next">次の問題 →</button>
    </div>
  </div>`;
  wireDrillHead();
  if(q.type==="select"){
    [...document.querySelectorAll("#opts .opt")].forEach(b=>b.onclick=()=>answerSelect(q,+b.dataset.i));
  }else{
    [...document.querySelectorAll("#opts .cnt")].forEach(b=>b.onclick=()=>answerCount(q,+b.dataset.n));
  }
  document.getElementById("next").onclick=()=>{pi++;if(pi>=pool.length){buildPool(curFilter);} answered=false; render();};
}
function wireDrillHead(){
  const f=document.getElementById("filt"); if(f)f.onchange=()=>{curFilter=f.value;buildPool(curFilter);render();};
  const ow=document.getElementById("ow"); if(ow)ow.onchange=()=>{onlyWrong=ow.checked;buildPool(curFilter);render();};
  const rs=document.getElementById("reshuffle"); if(rs)rs.onclick=()=>{buildPool(curFilter);render();};
}
function showFb(q,correct,htmlWhy){
  const fb=document.getElementById("fb");
  const note=q.tech.map(tk=>`<div><b>${S().TECH[tk].n}</b>：${S().TECH[tk].how}</div>`).join("");
  fb.innerHTML=`<div class="verdict" style="color:${correct?'var(--green)':'var(--red)'}">${correct?'正解':'不正解'}</div>`
    +htmlWhy+`<div class="note"><b>この問題が訓練する罠</b><br>${note}</div>`;
  fb.classList.add("show");
  document.getElementById("nav").style.display="flex";
}
function answerSelect(q,i){
  if(answered)return; answered=true;
  const correctIdx=q.choices.findIndex(c=>c.ok);
  const correct=i===correctIdx;
  [...document.querySelectorAll("#opts .opt")].forEach((b,bi)=>{
    b.onclick=null;
    if(bi===correctIdx)b.classList.add("ok");
    else if(bi===i)b.classList.add("ng");
  });
  const why=q.choices.map((c,bi)=>`<div class="why ${c.ok?'good':'bad'}">${"１２３４"[bi]} ${c.ok?'○':'×'}　${c.why}</div>`).join("");
  record(q,correct); showFb(q,correct,why);
}
function answerCount(q,n){
  if(answered)return; answered=true;
  const ans=q.stmts.filter(s=>s.ok).length;
  const correct=n===ans;
  [...document.querySelectorAll("#opts .cnt")].forEach(b=>{b.onclick=null;
    const bn=+b.dataset.n; if(bn===ans)b.classList.add("ok"); else if(bn===n)b.classList.add("ng");});
  const lt="アイウエ";
  const why=q.stmts.map((s,i)=>`<div class="why ${s.ok?'good':'bad'}">${lt[i]} ${s.ok?'○正':'×誤'}　${s.why}</div>`).join("")
    +`<div class="why">正しいのは <b>${"一二三四"[ans-1]}つ</b>。</div>`;
  record(q,correct); showFb(q,correct,why);
}

function renderCore(){ main.innerHTML=S().core; }

function renderTerms(){
  main.innerHTML=`<div class="card muted">難解な用語を「平易な言い換え＋具体例＋対の概念＋つながる罠」で。タップで開きます。</div>`
   +S().TERMS.map((t,i)=>`<div class="card">
     <div class="term-h" data-i="${i}"><b>${t.t}</b><span class="yomi">${t.y}</span><span class="chev">▼</span></div>
     <div class="term-body" id="tb${i}">
       <div class="kv"><span class="k">ひとことで</span><span>${t.p}</span></div>
       <div class="kv"><span class="k">具体例</span><span>${t.e}</span></div>
       ${t.pa?`<div class="kv"><span class="k">対の概念</span><span>${t.pa}</span></div>`:""}
       ${t.tr?`<div style="margin-top:8px"><span class="pill a">つながる罠：${S().TECH[t.tr].n}</span></div>`:""}
     </div></div>`).join("");
  [...document.querySelectorAll(".term-h")].forEach(h=>h.onclick=()=>{
    document.getElementById("tb"+h.dataset.i).classList.toggle("open");
    h.querySelector(".chev").textContent=document.getElementById("tb"+h.dataset.i).classList.contains("open")?"▲":"▼";
  });
}

function renderTech(){
  const ts=techStats();
  main.innerHTML=`<div class="card muted">出題者が毎年狙うツボ。見分け方を覚え、演習で正答率を上げる。</div>`
   +tkeys().map(k=>{
     const s=ts[k]; const pct=s.seen?Math.round(s.correct/s.seen*100):null;
     return `<div class="card tech">
       <b>${k}　${S().TECH[k].n}</b>
       <div class="lbl">見分け方</div><div>${S().TECH[k].how}</div>
       <div class="lbl">例</div><div class="ex">${S().TECH[k].ex}</div>
       <div class="lbl">あなたの正答率</div>
       ${pct===null?`<div class="muted">未演習</div>`:`<div class="bar"><i style="width:${pct}%"></i></div><div class="muted">${pct}％（${s.correct}/${s.seen}）</div>`}
     </div>`;}).join("");
}

function renderWeak(){
  const ts=techStats();
  const rows=tkeys().map(k=>{const s=ts[k];return{k,seen:s.seen,correct:s.correct,pct:s.seen?s.correct/s.seen:-1};});
  const done=rows.filter(r=>r.seen>0).sort((a,b)=>a.pct-b.pct);
  const tot=Object.values(store).reduce((a,s)=>a+s.seen,0);
  const totc=Object.values(store).reduce((a,s)=>a+s.correct,0);
  let html=`<div class="card" style="text-align:center">
     <div class="muted">${S().label}・総演習</div><div class="big">${tot} 問</div>
     <div class="muted">正答率 ${tot?Math.round(totc/tot*100):0}％</div></div>`;
  if(!done.length){html+=`<div class="card">まず演習を解くと、弱い罠がここに並びます。</div>`;}
  else{
    html+=`<div class="card"><b>弱い罠ワースト順</b><div class="muted">ここが埋まったら、Claudeに「この罠の新問を出して」と頼む。</div><hr class="soft">`
     +done.map(r=>`<div class="stat-row">
        <span class="nm">${r.k} ${S().TECH[r.k].n}</span>
        <span class="b2"><span class="bar"><i style="width:${Math.round(r.pct*100)}%;background:${r.pct<0.6?'var(--coral)':'var(--teal)'}"></i></span></span>
        <span class="pct">${Math.round(r.pct*100)}%</span></div>`).join("")
     +`</div>`;
  }
  html+=`<div class="card"><button class="btn ghost" id="reset">この科目の進捗をリセット</button></div>`;
  main.innerHTML=html;
  document.getElementById("reset").onclick=()=>{if(confirm(S().label+"の進捗を消去しますか？")){store={};save();render();}};
}

loadStore();
render();
</script>
</body>
</html>
